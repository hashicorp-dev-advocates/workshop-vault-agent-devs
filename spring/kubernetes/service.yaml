apiVersion: v1
kind: Service
metadata:
  name: payments-app
  namespace: default
  labels:
    app: payments-app
spec:
  type: NodePort
  selector:
    app: payments-app
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      # NodePort 30080 is reachable at http://<node-ip>:30080 on both k3s and Kind.
      nodePort: 30080
