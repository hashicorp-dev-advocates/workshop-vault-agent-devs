# =============================================================================
# Application base configuration — safe defaults, committed to source control.
# =============================================================================

spring.application.name=payments-app

# ---------------------------------------------------------------------------
# Actuator: expose health endpoint only.
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health

# ---------------------------------------------------------------------------
# DataSource — hardcoded credentials for local development only.
# These will be replaced by Vault Agent-rendered credentials during the workshop.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:localhost}:5432/payments
spring.datasource.username=postgres
spring.datasource.password=postgres
