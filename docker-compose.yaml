# =============================================================================
# docker-compose.yml
#
# Full tutorial stack. Runs two variants simultaneously:
#
#   Docker Compose variant:
#     postgres → vault → vault-init → vault-agent → payments-app
#
#   Kubernetes variant (k3s):
#     k3s server + agent share the same vpcbr network as Vault and Postgres.
#     Run `bash vault/setup-k8s.sh` after `podman compose up -d` to install
#     the Vault Agent Injector and deploy the app into k3s.
#
# All services are on the vpcbr bridge (10.5.0.0/16) with fixed IPs so that
# the Vault address (http://10.5.0.2:8200) is stable and can be hardcoded in
# the Helm chart and Kubernetes deployment annotations.
#
# Usage:
#   mkdir -p tmp secrets
#   chmod 777 secrets/
#   podman compose up -d
#
# Reset:
#   podman compose down -v
#   rm -rf tmp/ secrets/vault-token secrets/vault-secrets.properties
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # vault
  # HashiCorp Vault in dev mode. Fixed IP 10.5.0.2 so k3s pods can reach it
  # at a stable address. Root token is "root-token".
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.21.4
    restart: always
    command: ['vault', 'server', '-dev']
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    networks:
      vpcbr:
        ipv4_address: 10.5.0.2
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>/dev/null | grep -q 'Sealed.*false'"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # database
  # PostgreSQL 16. Fixed IP 10.5.0.3 so k3s pods can connect at a stable
  # address. The init SQL creates the payments table on first start.
  # ---------------------------------------------------------------------------
  database:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./vault/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      vpcbr:
        ipv4_address: 10.5.0.3
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # vault-init
  # One-shot service that runs vault/setup.sh to configure secrets engines,
  # policy, and write the agent token to secrets/. Does NOT set KUBECONFIG so
  # the Kubernetes auth section of setup.sh is silently skipped here.
  # ---------------------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:1.21.4
    environment:
      VAULT_ADDR: "http://10.5.0.2:8200"
      VAULT_TOKEN: "root-token"
      SECRETS_DIR: /secrets
    volumes:
      - ./vault:/vault:ro
      - ./secrets:/secrets
    entrypoint: ["sh", "/vault/setup.sh"]
    restart: "no"
    networks:
      vpcbr:
        ipv4_address: 10.5.0.6
    depends_on:
      vault:
        condition: service_healthy
      database:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # vault-agent
  # Runs Vault Agent in daemon mode. Renders secrets.ctmpl to
  # /secrets/vault-secrets.properties and calls /actuator/refresh after each
  # re-render. Healthcheck confirms the file exists before payments-app starts.
  # ---------------------------------------------------------------------------
  vault-agent:
    image: hashicorp/vault:1.21.4
    environment:
      VAULT_ADDR: "http://10.5.0.2:8200"
    volumes:
      - ./spring/vault:/spring/vault:ro
      - ./secrets:/secrets
    entrypoint: ["vault", "agent", "-config=/spring/vault/agent.hcl"]
    networks:
      vpcbr:
        ipv4_address: 10.5.0.7
    depends_on:
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /secrets/vault-secrets.properties"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # payments-app (Docker Compose variant)
  # Spring Boot app reading secrets from the file rendered by vault-agent.
  # ---------------------------------------------------------------------------
  payments-app:
    build:
      context: ./spring/payments-app
      dockerfile: Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: "file:/vault/secrets/vault-secrets.properties"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://10.5.0.3:5432/payments"
    volumes:
      - ./secrets:/vault/secrets:ro
    ports:
      - "8080:8080"
    networks:
      vpcbr:
        ipv4_address: 10.5.0.8
    depends_on:
      vault-agent:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # server (k3s)
  # k3s server node. Writes kubeconfig to ./tmp/kubeconfig.yaml so that
  # vault/setup-k8s.sh can use it on the host. Shares vpcbr so pods inside
  # k3s can reach Vault at 10.5.0.2:8200 and Postgres at 10.5.0.3:5432.
  # ---------------------------------------------------------------------------
  server:
    image: "rancher/k3s:${K3S_VERSION:-latest}"
    networks:
      vpcbr:
        ipv4_address: 10.5.0.4
    command: server
    tmpfs:
      - /run
      - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    restart: always
    environment:
      - K3S_TOKEN=${K3S_TOKEN:?err}
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - ./tmp:/output
    ports:
      - 6443:6443

  # ---------------------------------------------------------------------------
  # agent (k3s)
  # k3s agent node. Joins the server over the vpcbr network.
  # ---------------------------------------------------------------------------
  agent:
    image: "rancher/k3s:${K3S_VERSION:-latest}"
    networks:
      vpcbr:
        ipv4_address: 10.5.0.5
    tmpfs:
      - /run
      - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    restart: always
    environment:
      - K3S_URL=https://server:6443
      - K3S_TOKEN=${K3S_TOKEN:?err}
    volumes:
      - k3s-agent:/var/lib/rancher/k3s

volumes:
  postgres-data: {}
  k3s-server: {}
  k3s-agent: {}

networks:
  vpcbr:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
