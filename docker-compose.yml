# =============================================================================
# docker-compose.yml
#
# Local tutorial stack: Vault Agent injects secrets into the payments-app
# without Kubernetes. Services start in dependency order:
#
#   postgres → vault → vault-init → vault-agent → payments-app
#
# The "secrets/" directory is bind-mounted as the shared secrets volume.
# It is git-ignored — never commit its contents.
#
# Usage:
#   # First-time setup (Podman rootless requires world-writable secrets dir):
#   chmod 777 secrets/
#   podman compose up
#
# To reset between runs:
#   podman compose down -v && rm -f secrets/vault-token secrets/vault-secrets.properties
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # postgres
  # PostgreSQL 16 database. The payments database and schema are created via
  # an init SQL script mounted at docker-entrypoint-initdb.d/.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./vault/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # vault
  # HashiCorp Vault in dev mode. Dev mode starts unsealed with a known root
  # token — suitable for local development and tutorials only.
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:latest
    environment:
      SKIP_SETCAP: true
      SKIP_CHOWN: true
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 2>/dev/null | grep -q 'Sealed.*false'"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # vault-init
  # One-shot service that runs vault/setup.sh to configure secrets engines,
  # the payments-app policy, and write the agent token to secrets/.
  # restart: "no" — must succeed exactly once. If it fails, fix the error
  # and re-run: docker compose up vault-init
  # ---------------------------------------------------------------------------
  vault-init:
    image: hashicorp/vault:latest
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: root
      SECRETS_DIR: /secrets
    volumes:
      - ./vault:/vault:ro
      - ./secrets:/secrets
    entrypoint: ["sh", "/vault/setup.sh"]
    restart: "no"
    depends_on:
      vault:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # vault-agent
  # Runs Vault Agent in daemon mode. Authenticates using the token written by
  # vault-init, renders secrets.ctmpl to /secrets/application.properties, and
  # calls /actuator/refresh on the payments-app after each re-render.
  #
  # Healthcheck: confirms application.properties has been written before
  # payments-app is allowed to start.
  # ---------------------------------------------------------------------------
  vault-agent:
    image: hashicorp/vault:latest
    environment:
      VAULT_ADDR: "http://vault:8200"
    volumes:
      - ./spring/vault:/spring/vault:ro
      - ./secrets:/secrets
    entrypoint: ["vault", "agent", "-config=/spring/vault/agent.hcl"]
    depends_on:
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "test -f /secrets/vault-secrets.properties"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---------------------------------------------------------------------------
  # payments-app
  # Spring Boot application. Does NOT start until vault-agent is healthy
  # (i.e. secrets/application.properties exists). If started without the
  # secrets file present it will fast-fail on the missing spring.config.import.
  # ---------------------------------------------------------------------------
  payments-app:
    build:
      context: ./spring/payments-app
      dockerfile: Dockerfile
    environment:
      SPRING_CONFIG_IMPORT: "file:/vault/secrets/vault-secrets.properties"
    volumes:
      - ./secrets:/vault/secrets:ro
    ports:
      - "8080:8080"
    depends_on:
      vault-agent:
        condition: service_healthy

volumes:
  postgres-data:
